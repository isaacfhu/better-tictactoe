<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>Better Tic-Tac-Toe</title>
  </head>
  <body>
    <div class="page">
      <div class="how-div">
        <h3>How to play</h3>
        <p>
          blablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablablabla
        </p>
      </div>
      <div class="main">
        <div class="top-div">
          <div><span class="turn-text">Player</span>'s Turn</div>
        </div>
        <div class="middle-div">
          <div class="game-div">
            <button class="box" id="1"></button>
            <button class="box" id="2"><span></span></button>
            <button class="box" id="3"><span></span></button>
            <button class="box" id="4"><span></span></button>
            <button class="box" id="5"><span></span></button>
            <button class="box" id="6"><span></span></button>
            <button class="box" id="7"><span></span></button>
            <button class="box" id="8"><span></span></button>
            <button class="box" id="9"><span></span></button>
            <button class="box" id="10"><span></span></button>
            <button class="box" id="11"><span></span></button>
            <button class="box" id="12"><span></span></button>
            <button class="box" id="13"><span></span></button>
            <button class="box" id="14"><span></span></button>
            <button class="box" id="15"><span></span></button>
            <button class="box" id="16"><span></span></button>
          </div>
        </div>
        <div class="scores">
          <div><span class="red">X</span> : <span class="score-x">0</span></div>
          <div>
            <span class="blue">O</span> : <span class="score-o">0</span>
          </div>
          <button class="reset">Reset</button>
        </div>
      </div>
    </div>
    <p class="debug-text"></p>
  </body>
</html>
